<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmark Curator</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --warning: #92400e;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 32px;
    }

    header h1 { margin: 0 0 4px; font-size: 28px; }
    header p { margin: 0; color: #d1d5db; }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 18px;
    }

    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    label { display: block; font-weight: 600; margin-bottom: 6px; }

    input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
    }

    .checkbox-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
      font-weight: 500;
    }

    .checkbox-row input { margin: 0; }

    button, .button {
      display: inline-block;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    button:hover, .button:hover { background: var(--primary-dark); }

    .muted { color: var(--muted); }
    .small { font-size: 14px; }

    .alert {
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .alert-error { background: var(--error-bg); color: var(--error-text); border: 1px solid #fecaca; }
    .alert-warning { background: #fffbeb; color: var(--warning); border: 1px solid #fde68a; }

    .metric {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .metric strong { display: block; font-size: 26px; }
    .metric span { color: var(--muted); font-size: 14px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    th { font-size: 14px; color: var(--muted); }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 700;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

    @media (max-width: 800px) {
      .grid-2, .grid-4 { grid-template-columns: 1fr; }
      header { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Bookmark Curator Agent</h1>
    <p>Ordená pendientes, detectá links problemáticos y generá reportes accionables.</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
