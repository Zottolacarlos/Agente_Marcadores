<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmark Curator</title>
  <style>
    :root {
      --bg: #0f1115;
      --bg-elev: #12141a;
      --card: #1a1d24;
      --text: #e6e8ee;
      --muted: #9aa3b2;
      --border: #2a2f3a;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --warning-bg: #2a230f;
      --warning-text: #fcd34d;
      --warning-border: #4d3f12;
      --error-bg: #2a1416;
      --error-text: #fca5a5;
      --error-border: #5b1f23;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: linear-gradient(135deg, #161922 0%, #1d2030 100%);
      color: var(--text);
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 { margin: 0 0 4px; font-size: 28px; }
    header p { margin: 0; color: var(--muted); }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 48px;
    }

    h2, h3 { color: var(--text); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      margin-bottom: 18px;
    }

    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    label { display: block; font-weight: 600; margin-bottom: 6px; }

    input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-elev);
      color: var(--text);
    }

    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    input[type="file"] { padding: 8px; cursor: pointer; }
    input[type="file"]::file-selector-button {
      border: 0;
      border-radius: 8px;
      background: #2a2f3a;
      color: var(--text);
      padding: 8px 12px;
      margin-right: 12px;
      cursor: pointer;
    }
    input[type="file"]::file-selector-button:hover { background: #343a47; }

    ::placeholder { color: #6b7280; }

    .checkbox-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
      font-weight: 500;
    }

    .checkbox-row input { margin: 0; accent-color: var(--primary); }

    button, .button {
      display: inline-block;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    button:hover, .button:hover { background: var(--primary-dark); }

    .button-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
    }
    .button-ghost:hover { background: var(--bg-elev); }

    .muted { color: var(--muted); }
    .small { font-size: 14px; }

    .alert {
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .alert-error { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }
    .alert-warning { background: var(--warning-bg); color: var(--warning-text); border: 1px solid var(--warning-border); }

    .metric {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .metric strong { display: block; font-size: 26px; }
    .metric span { color: var(--muted); font-size: 14px; }

    pre {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    th { font-size: 14px; color: var(--muted); }

    a { color: #93c5fd; }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #20243a;
      color: #c7d2fe;
      font-size: 13px;
      font-weight: 700;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

    .pill-ai { background: #1e2b22; color: #86efac; }

    .ai-banner {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #14211a;
      border: 1px solid #1f3a2a;
      color: #c7f9d8;
      font-size: 15px;
    }

    .file-info {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #142016;
      border: 1px solid #1f3a26;
      color: #86efac;
      font-size: 14px;
    }
    .file-info .muted { color: #9aa3b2; }

    /* Sugerencias de carpetas (chips clickeables) */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .chip:hover { border-color: var(--primary); background: #1c2030; }
    .chip.active { border-color: var(--primary); background: #20243a; }
    .chip.chip-l2 { opacity: 0.92; padding-left: 20px; }
    .chip .chip-count {
      background: #2a2f3a;
      color: var(--muted);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 12px;
    }
    .chip.active .chip-count { background: var(--primary); color: white; }

    @media (max-width: 800px) {
      .grid-2, .grid-4 { grid-template-columns: 1fr; }
      header { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Bookmark Curator Agent</h1>
    <p>Ordená pendientes, detectá links problemáticos y generá reportes accionables.</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
